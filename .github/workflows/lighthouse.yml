name: Lighthouse audit (deployed site)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 4 * * 1' # weekly on Monday at 04:00 UTC

jobs:
  lighthouse-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci

      - name: Run Lighthouse against deployed site
        env:
          TARGET_URL: https://kevinfroger.nl
        run: |
          npx --yes lighthouse "$TARGET_URL" \
            --output=json \
            --output-path=./lighthouse_report.json \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu --ignore-certificate-errors" \
            --quiet

      - name: Upload Lighthouse JSON report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: ./lighthouse_report.json

      - name: Print summary (small)
        if: always()
        run: |
          echo "Lighthouse run complete. Artifact: lighthouse-report (lighthouse_report.json)"
