name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (Vite -> dist)
        run: npm run build

      - name: Post-build: voeg images en SWA-config toe aan dist
        shell: bash
        run: |
          # 1) fail fast als dist ontbreekt
          test -d dist || (echo "dist ontbreekt - build faalde"; exit 1)

          # 2) images/ -> dist/images (alleen als images/ bestaat)
          if [ -d images ]; then
            mkdir -p dist/images
            cp -r images/* dist/images/ 2>/dev/null || true
          fi

          # 3) staticwebapp.config.json -> dist/ (als hij in de root staat)
          if [ -f staticwebapp.config.json ]; then
            cp -f staticwebapp.config.json dist/
          fi

          # 4) favicon/vite.svg meeleveren als ze bestaan
          if [ -f public/favicon.svg ] && [ ! -f dist/favicon.svg ]; then
            cp public/favicon.svg dist/favicon.svg
          fi
          if [ -f public/vite.svg ] && [ ! -f dist/vite.svg ]; then
            cp public/vite.svg dist/vite.svg
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_SAND_06934A803 }}
          action: upload
          app_location: "/"
          output_location: "dist"
          skip_app_build: true
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_SAND_06934A803 }}
          action: close
