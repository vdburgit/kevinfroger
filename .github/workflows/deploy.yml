name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # SPA fallback: 404.html = kopie van index.html, zodat deep links
      # zoals /dj-boeken-tiel direct werken op GitHub Pages.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      # CNAME zorgt dat GitHub Pages het custom domain serveert.
      - name: Add CNAME
        run: echo "kevinfroger.nl" > dist/CNAME

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: kevinfroger.nl
