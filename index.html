<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Kevin Froger - DJ Kevin Froger</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: white;
      background: linear-gradient(135deg,
        #0a0a0a 0%,
        #1a0a1a 15%,
        #0a1a2e 30%,
        #1a1a0a 45%,
        #2e0a1a 60%,
        #0a2e1a 75%,
        #1a0a2e 90%,
        #0a0a0a 100%);
      background-size: 400% 400%;
      animation: backgroundShift 20s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    @keyframes backgroundShift {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 50% 25%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 75%; }
    }

    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=2070');
      background-size: cover;
      background-position: center;
      filter: brightness(0.3);
      z-index: 0;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(255, 87, 51, 0.15) 0%, rgba(0, 0, 0, 0.7) 100%);
      z-index: 1;
    }

    .accent-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      z-index: 1;
      animation: pulse 6s ease-in-out infinite;
    }

    .accent-glow.orange {
      background: radial-gradient(circle, #FF5733 0%, #FF8C00 50%, #FFD700 100%);
      top: -150px;
      right: 5%;
    }

    .accent-glow.blue {
      background: radial-gradient(circle, #0066CC 0%, #00BFFF 50%, #4169E1 100%);
      bottom: -150px;
      left: 5%;
      animation-delay: 3s;
    }

    .accent-glow.purple {
      background: radial-gradient(circle, #8B00FF 0%, #9932CC 50%, #BA55D3 100%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 1.5s;
      opacity: 0.3;
    }

    .accent-glow.green {
      background: radial-gradient(circle, #00FF7F 0%, #32CD32 50%, #7FFF00 100%);
      top: 10%;
      left: 15%;
      width: 400px;
      height: 400px;
      animation-delay: 4.5s;
      opacity: 0.25;
    }

    .accent-glow.red {
      background: radial-gradient(circle, #FF1493 0%, #FF69B4 50%, #FF6347 100%);
      bottom: 15%;
      right: 20%;
      width: 450px;
      height: 450px;
      animation-delay: 2s;
      opacity: 0.3;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      33% { transform: scale(1.3); opacity: 0.5; }
      66% { transform: scale(0.9); opacity: 0.4; }
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 650px;
      padding: 40px 20px;
    }

    .logo {
      width: 380px;
      max-width: 90%;
      height: auto;
      margin: 0 auto 2rem;
      filter: drop-shadow(0 4px 12px rgba(255, 87, 51, 0.5));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #FF5733 0%, #FFA500 50%, #FF5733 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient 3s linear infinite;
      display: none;
    }

    @keyframes gradient {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    h2 {
      font-size: 1.75rem;
      font-weight: 400;
      margin-bottom: 2.5rem;
      color: #0066CC;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(0, 102, 204, 0.6);
    }

    .message {
      font-size: 2rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      color: #ffffff;
      font-weight: 700;
    }

    .message p {
      margin-bottom: 1rem;
    }

    .contact {
      margin-top: 2.5rem;
      font-size: 1.5rem;
      line-height: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .contact div {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 400px;
      font-weight: 500;
    }

    .contact-label {
      color: #FF5733;
      font-weight: 600;
      min-width: 100px;
      text-align: right;
      margin-right: 1rem;
    }

    .contact-value {
      color: #ffffff;
      text-align: left;
      flex: 1;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.9rem;
      opacity: 0.7;
      color: #999;
    }

    @media (max-width: 768px) {
      .logo {
        width: 280px;
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: 2.25rem;
      }

      h2 {
        font-size: 1.4rem;
        letter-spacing: 2px;
      }

      .message p:first-child {
        font-size: 1.25rem !important;
      }

      .message p:last-child {
        font-size: 0.95rem !important;
      }

      .contact {
        font-size: 1.05rem;
      }

      .content {
        padding: 30px 20px;
        margin: 20px;
      }

      .accent-glow {
        width: 300px;
        height: 300px;
      }
    }

    @media (max-width: 480px) {
      .logo {
        width: 220px;
      }

      h1 {
        font-size: 1.875rem;
      }

      h2 {
        font-size: 1.2rem;
        letter-spacing: 1px;
      }

      .message p:first-child {
        font-size: 1.1rem !important;
      }

      .message p:last-child {
        font-size: 0.85rem !important;
      }

      .contact {
        font-size: 0.9rem;
        gap: 0.75rem;
      }

      .contact div {
        flex-direction: column;
        text-align: center;
        gap: 0.25rem;
      }

      .contact-label {
        min-width: auto;
        text-align: center;
        margin-right: 0;
      }

      .contact-value {
        text-align: center;
      }

      .content {
        padding: 20px 15px;
      }

      .accent-glow {
        width: 250px;
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="overlay"></div>
  <div class="accent-glow orange"></div>
  <div class="accent-glow blue"></div>
  <div class="accent-glow purple"></div>
  <div class="accent-glow green"></div>
  <div class="accent-glow red"></div>

  <div class="content">
    <img src="/images/logos/LOGO-KEVIN-FROGER-2025 (4).png" alt="DJ Kevin Froger Logo" class="logo">
    <h1>Kevin Froger</h1>

    <div class="message">
      <p style="font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem;">Deze website is momenteel offline.</p>
      <p style="font-size: 1.1rem; font-weight: 400; color: #e0e0e0;">Voor boekingen of vragen kunt u direct contact opnemen.</p>
    </div>

    <div class="contact">
      <div>
        <span class="contact-label">Telefoon:</span>
        <span class="contact-value">06 45 25 13 33</span>
      </div>
      <div>
        <span class="contact-label">E-mail:</span>
        <span class="contact-value">kevin@kevinfroger.nl</span>
      </div>
    </div>

    <footer>
      &copy; Kevin Froger
    </footer>
  </div>
</body>
</html>
