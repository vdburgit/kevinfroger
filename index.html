<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Google Consent Mode v2: standaard alles geweigerd tot de bezoeker kiest
         (AVG). De cookiebanner (React) stuurt een consent-update bij akkoord, en
         herstelt een eerdere keuze bij de volgende paginaload. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag("consent", "default", {
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        analytics_storage: "denied",
        wait_for_update: 500,
      });
      try {
        if (localStorage.getItem("kf-consent") === "granted") {
          gtag("consent", "update", { analytics_storage: "granted" });
        }
      } catch (e) {}
    </script>
    <!-- Google Tag Manager (uitgesteld: laadt bij eerste interactie of 2s na load,
         zodat het de first paint op mobiel niet vertraagt. dataLayer staat meteen
         klaar, dus events die eerder gepusht worden queuen tot GTM geladen is). -->
    <script>
      (function (w, d, s, l, i) {
        // Alleen op het productiedomein laden. Zo vervuilen dev/test/preview
        // (test26, dev.kevinfroger.nl, localhost, IP) en de prerender de GA4-
        // property niet. track.ts init zelf de dataLayer, dus vroeg stoppen mag.
        var host = w.location.hostname;
        if (host !== "kevinfroger.nl" && host !== "www.kevinfroger.nl") return;
        w[l] = w[l] || [];
        function loadGTM() {
          if (w.__gtmLoaded) return;
          w.__gtmLoaded = true;
          w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != "dataLayer" ? "&l=" + l : "";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
          f.parentNode.insertBefore(j, f);
        }
        var evts = ["scroll", "mousemove", "touchstart", "keydown", "click"];
        evts.forEach(function (e) {
          w.addEventListener(e, loadGTM, { once: true, passive: true });
        });
        w.addEventListener("load", function () {
          setTimeout(loadGTM, 2000);
        });
      })(window, document, "script", "dataLayer", "GTM-PV4P82PD");
    </script>
    <!-- End Google Tag Manager -->
    <meta name="theme-color" content="#E5512C" />
    <!-- title + description worden per route door de router (HeadContent) gezet;
         hier bewust niet hardcoden om dubbele tags te voorkomen. -->
    <link rel="icon" type="image/png" href="/images/kevin-logo.png" />
    <link rel="apple-touch-icon" href="/images/kevin-logo.png" />
    <!-- LCP hero: preload de responsive WebP-set zodat de preload-scanner 'm vindt vóór de JS rendert -->
    <link
      rel="preload"
      as="image"
      href="/images/hero-crowd-1280.webp"
      imagesrcset="/images/hero-crowd-640.webp 640w, /images/hero-crowd-1280.webp 1280w, /images/hero-crowd-1920.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />
    <!--
      Fonts worden zelf gehost (woff2 in /fonts, @font-face in styles.css) zodat er
      geen render-blokkerende externe Google Fonts-aanroep meer is. We preloaden de
      twee meest gebruikte boven de vouw: Barlow Condensed 700 (hero-koptekst) en
      Inter 400 (bodytekst). De rest laadt via @font-face met font-display: swap.
    -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/barlow-condensed-700.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-400.woff2" crossorigin />
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-PV4P82PD"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- DJ Kevin Froger chatbot (sitewide, zelfstandig, geen externe diensten) -->
    <script defer src="/kevin-chatbot.js"></script>
  </body>
</html>
