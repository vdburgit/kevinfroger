<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Google Tag Manager -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-PV4P82PD");
    </script>
    <!-- End Google Tag Manager -->
    <meta name="theme-color" content="#E5512C" />
    <!-- title + description worden per route door de router (HeadContent) gezet;
         hier bewust niet hardcoden om dubbele tags te voorkomen. -->
    <link rel="icon" type="image/png" href="/images/kevin-logo.png" />
    <link rel="apple-touch-icon" href="/images/kevin-logo.png" />
    <!-- LCP hero: preload de responsive WebP-set zodat de preload-scanner 'm vindt vóór de JS rendert -->
    <link
      rel="preload"
      as="image"
      href="/images/hero-crowd-1280.webp"
      imagesrcset="/images/hero-crowd-640.webp 640w, /images/hero-crowd-1280.webp 1280w, /images/hero-crowd-1920.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Alleen de twee daadwerkelijk gebruikte families (Barlow Condensed = display,
      Inter = body). Niet-blokkerend geladen via media="print"/onload zodat het
      stylesheet de first paint niet ophoudt; display=swap toont direct fallback-tekst.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-PV4P82PD"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
