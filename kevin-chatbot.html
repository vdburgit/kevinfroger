  }
  /* Op mobiel staat de sticky bel/WhatsApp-balk (MobileCtaBar) onderaan;

  @media (max-width:767px){

    #kf-chat-root .kf-window{max-height:calc(100vh - 194px);}
  }
  #kf-chat-root *{box-sizing:border-box;}
  .kf-launcher{position:relative;width:64px;height:64px;border:none;border-radius:50%;cursor:pointer;
    background:radial-gradient(circle at 30% 30%,var(--kf-orange-2),var(--kf-orange));
    color:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px var(--kf-glow),0 0 0 0 var(--kf-glow);
    transition:transform .2s cubic-bezier(.16,1,.3,1);animation:kf-pulse 2.6s infinite;}
  @keyframes kf-pulse{0%{box-shadow:0 10px 30px var(--kf-glow),0 0 0 0 var(--kf-glow);}
    70%{box-shadow:0 10px 30px var(--kf-glow),0 0 0 16px rgba(229,81,44,0);}
    100%{box-shadow:0 10px 30px var(--kf-glow),0 0 0 0 rgba(229,81,44,0);}}
  .kf-launcher:hover{transform:scale(1.08);}
  .kf-launcher svg{width:30px;height:30px;}
  .kf-launcher .kf-launch-img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;}
  .kf-launcher .kf-x{display:none;}
  #kf-chat-root.kf-open .kf-launcher{animation:none;}
  /* Pulse stopt blijvend zodra de bezoeker de chat één keer opende (geen eeuwige repaint). */
  #kf-chat-root.kf-engaged .kf-launcher{animation:none;}
  #kf-chat-root.kf-open .kf-launcher .kf-bubble-ic{display:none;}
  #kf-chat-root.kf-open .kf-launcher .kf-x{display:block;}
  .kf-badge{position:absolute;top:-3px;right:-3px;min-width:20px;height:20px;padding:0 5px;
    background:#28c76f;border:2px solid var(--kf-bg);border-radius:10px;color:#fff;
    font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  #kf-chat-root.kf-open .kf-badge{display:none;}
  .kf-window{position:absolute;bottom:80px;right:0;width:380px;max-width:calc(100vw - 32px);
    height:600px;max-height:calc(100vh - 130px);background:var(--kf-bg);
    border:1px solid rgba(255,255,255,.06);border-radius:var(--kf-radius);
    box-shadow:0 30px 70px rgba(0,0,0,.55);display:flex;flex-direction:column;overflow:hidden;
    opacity:0;transform:translateY(20px) scale(.97);transform-origin:bottom right;
    pointer-events:none;transition:opacity .25s,transform .25s cubic-bezier(.16,1,.3,1);}
  #kf-chat-root.kf-open .kf-window{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
  .kf-head{position:relative;padding:18px 20px;color:#fff;overflow:hidden;
    background:linear-gradient(135deg,#2a201b 0%,#1c1714 100%);border-bottom:1px solid rgba(255,255,255,.06);}
  .kf-head::before{content:"";position:absolute;top:-40%;right:-10%;width:160px;height:160px;
    background:radial-gradient(circle,var(--kf-orange) 0%,transparent 70%);opacity:.5;filter:blur(8px);}
  .kf-head-row{position:relative;display:flex;align-items:center;gap:13px;}
  .kf-avatar{width:46px;height:46px;border-radius:50%;flex:0 0 auto;overflow:hidden;
    background:var(--kf-panel);box-shadow:0 4px 14px var(--kf-glow);
    border:2px solid rgba(255,106,61,.6);}
  .kf-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .kf-head h4{margin:0;font-size:16px;font-weight:700;letter-spacing:.2px;}
  .kf-head p{margin:3px 0 0;font-size:12px;color:#cdbfb6;display:flex;align-items:center;gap:6px;}
  .kf-dot{width:8px;height:8px;border-radius:50%;background:#28c76f;box-shadow:0 0 8px #28c76f;}
  .kf-body{flex:1;overflow-y:auto;padding:18px 16px;background:radial-gradient(circle at 50% 0%,#221a16 0%,var(--kf-bg) 60%);}
  .kf-body::-webkit-scrollbar{width:6px;}
  .kf-body::-webkit-scrollbar-thumb{background:#3a302a;border-radius:3px;}
  .kf-row{display:flex;margin-bottom:10px;animation:kf-in .3s ease both;}
  .kf-row.user{justify-content:flex-end;}
  @keyframes kf-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .kf-msg{max-width:85%;padding:12px 15px;font-size:14px;line-height:1.55;border-radius:16px;}
  .kf-msg.bot{background:var(--kf-bot);color:var(--kf-text);border-bottom-left-radius:5px;border:1px solid rgba(255,255,255,.04);}
  .kf-msg.user{background:linear-gradient(135deg,var(--kf-orange),var(--kf-orange-2));color:#fff;border-bottom-right-radius:5px;font-weight:500;}
  .kf-msg b{color:#fff;}
  .kf-msg.bot b{color:var(--kf-orange-2);}
  .kf-msg a{color:var(--kf-orange-2);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(255,106,61,.4);}
  .kf-msg small{color:var(--kf-mut);}
  .kf-typing{display:flex;gap:4px;padding:14px 16px;background:var(--kf-bot);border-radius:16px;
    border-bottom-left-radius:5px;width:fit-content;}
  .kf-typing span{width:7px;height:7px;border-radius:50%;background:var(--kf-mut);animation:kf-bounce 1.2s infinite;}
  .kf-typing span:nth-child(2){animation-delay:.18s;}
  .kf-typing span:nth-child(3){animation-delay:.36s;}
  @keyframes kf-bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}
  .kf-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:4px 0 14px;align-items:stretch;}
  .kf-opt{display:flex;align-items:center;gap:9px;text-align:left;min-height:48px;
    background:var(--kf-panel);border:1px solid rgba(255,255,255,.07);color:var(--kf-text);
    padding:10px 12px;border-radius:13px;font-size:12.5px;font-weight:600;line-height:1.2;
    cursor:pointer;font-family:inherit;transition:border-color .16s,transform .16s,box-shadow .16s,background .16s;
    animation:kf-in .3s ease both;}
  .kf-opt .kf-ic{flex:0 0 auto;width:28px;height:28px;border-radius:8px;
    background:rgba(229,81,44,.14);display:flex;align-items:center;justify-content:center;font-size:14px;
    transition:background .16s;}
  .kf-opt .kf-lbl{flex:1;}
  .kf-opt:hover{border-color:var(--kf-orange);background:#2c241f;transform:translateY(-1px);
    box-shadow:0 6px 16px rgba(229,81,44,.22);}
  .kf-opt:hover .kf-ic{background:rgba(229,81,44,.28);}
  .kf-opt.kf-wide{grid-column:1 / -1;}
  .kf-opt.kf-more{justify-content:center;background:transparent;border-style:dashed;
    border-color:rgba(255,255,255,.18);color:var(--kf-mut);font-weight:600;}
  .kf-opt.kf-more .kf-ic{background:transparent;}
  .kf-opt.kf-more:hover{color:var(--kf-orange-2);border-color:var(--kf-orange);background:rgba(229,81,44,.06);}
  .kf-cta{display:flex;flex-direction:column;gap:8px;margin:2px 0 14px;animation:kf-in .3s ease both;}
  .kf-cta a{display:flex;align-items:center;gap:10px;text-decoration:none;border:none;
    padding:13px 16px;border-radius:13px;font-size:14px;font-weight:700;transition:transform .15s,filter .15s;}
  .kf-cta a:hover{transform:translateY(-1px);filter:brightness(1.08);}
  .kf-cta a.wa{background:#25D366;color:#fff;}
  .kf-cta a.mail{background:var(--kf-panel);color:var(--kf-text);border:1px solid rgba(255,255,255,.1);}
  .kf-cta a.tel{background:#fff;color:#16120f;}
  .kf-foot{padding:12px;background:var(--kf-bg-2);border-top:1px solid rgba(255,255,255,.06);display:flex;gap:9px;align-items:center;}
  .kf-foot input{flex:1;background:var(--kf-panel);border:1px solid rgba(255,255,255,.1);
    border-radius:24px;padding:12px 16px;font-size:14px;font-family:inherit;color:var(--kf-text);outline:none;}
  .kf-foot input::placeholder{color:var(--kf-mut);}
  .kf-foot input:focus{border-color:var(--kf-orange);}
  .kf-send{background:linear-gradient(135deg,var(--kf-orange),var(--kf-orange-2));border:none;
    border-radius:50%;width:44px;height:44px;color:#fff;cursor:pointer;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;transition:filter .15s,transform .15s;}
  .kf-send:hover{filter:brightness(1.1);transform:scale(1.05);}
  .kf-send svg{width:19px;height:19px;}
  .kf-credit{text-align:center;font-size:10px;color:var(--kf-mut);padding:7px 0 9px;background:var(--kf-bg-2);}
  .kf-credit b{color:var(--kf-orange-2);}

  // Levenshtein voor typefout-tolerantie
  function lev(a,b){
    if(Math.abs(a.length-b.length)>2) return 9;
    const m=a.length,n=b.length,d=[];
    for(let i=0;i<=m;i++) d[i]=[i];
    for(let j=0;j<=n;j++) d[0][j]=j;
    for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
      d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
    return d[m][n];
  }
  // Eén woord vs één key: exact / verbuiging (stam) / kleine typefout
  function wordMatches(w,k){
    if(w===k) return 1;
    if(w.length>=4 && k.length>=4){
      // verbuiging: alleen als het kortere woord een fors deel van het langere beslaat
      const shortL=Math.min(w.length,k.length), longL=Math.max(w.length,k.length);
      if((w.includes(k)||k.includes(w)) && shortL/longL>=0.7) return .9; // boeking/boek, festivals/festival
    }
    if(w.length>=5 && k.length>=5 && lev(w,k)<=1) return .7; // typefout: bruioft/bruiloft
    return 0;
  }

  function scoreTopic(words,keys){

      let best=0; words.forEach(w=>{ const m=wordMatches(w,k); if(m>best) best=m; });
      s+=best;
    });
    return s;
  }

  }

      const b=document.createElement('button');b.className='kf-opt';
      // splits het emoji-icoon van de tekst
      const m=t.label.match(/^(\S+)\s+(.*)$/);
      const icon=m?m[1]:"•", text=m?m[2]:t.label;
      const ic=document.createElement('span');ic.className='kf-ic';ic.textContent=icon;
      const lb=document.createElement('span');lb.className='kf-lbl';lb.textContent=text;
      b.appendChild(ic);b.appendChild(lb);
      b.style.animationDelay=(i*0.03)+'s';            // nette gestaffelde reveal
      b.onclick=()=>chooseTopic(t);
      w.appendChild(b);
    });
    // bij oneven aantal de laatste knop over de volle breedte voor een net raster
    if(list.length%2===1 && w.lastChild) w.lastChild.classList.add('kf-wide');
    bodyEl.appendChild(w);scroll();
  }

  // Compacte knop na een antwoord: toont pas op verzoek het volledige menu,
  // zodat het antwoord zelf leesbaar blijft en niet weggedrukt wordt.
  function showMoreButton(noScroll){
    const w=document.createElement('div');w.className='kf-options';
    const b=document.createElement('button');b.className='kf-opt kf-wide kf-more';
    const ic=document.createElement('span');ic.className='kf-ic';ic.textContent="💬";
    const lb=document.createElement('span');lb.className='kf-lbl';lb.textContent="Nog een vraag stellen";
    b.appendChild(ic);b.appendChild(lb);
    b.onclick=()=>{ w.remove(); showMenu(); };
    w.appendChild(b);bodyEl.appendChild(w);
    if(!noScroll) scroll();
  }

  function answerTopic(t,follow){
    botSay(t.answer,()=>{ if(t.cta) addCTA(t.cta,true); if(follow!==false) showMoreButton(true); }, true);
  }
  function chooseTopic(t){
    addMsg(t.label,'user');
    if(t.booking){ startBooking(); return; }
    botSay(t.answer,()=>{ if(t.cta) addCTA(t.cta,true); showMoreButton(true); }, true);
  }

  /* Boekingsflow */
  function startBooking(){ booking={step:0,data:{}}; askStep(); }
  function askStep(){
    const s=BOOKING_STEPS[booking.step];
    botSay(s.q.replace(/\{naam\}/g,booking.data.naam||""),()=>{ input.placeholder=s.ph; input.focus(); });
  }
  function handleBooking(text){
    const s=BOOKING_STEPS[booking.step];
    booking.data[s.key]=text.trim(); addMsg(text,'user'); booking.step++;
    if(booking.step<BOOKING_STEPS.length){ askStep(); return; }
    const d=booking.data; booking=null; input.placeholder="Typ je vraag…";
    botSay(`Helemaal goed, ${d.naam}! 🙌 Ik heb dit voor je klaargezet:<br><br>
      <b>Datum:</b> ${d.datum}<br><b>Plaats:</b> ${d.plaats}<br><b>Event:</b> ${d.type}<br><br>
      Tik op de knop om het direct naar Kevin te sturen — hij checkt de datum en reageert binnen 24 uur.`,
      ()=>{
        addCTA([
          {type:"wa",text:"💬 Verstuur naar Kevin via WhatsApp",link:waLink(bookingMsg(d))},
          {type:"mail",text:"✉️ Liever mailen",link:`mailto:${EMAIL}?subject=${encodeURIComponent("Datum-aanvraag "+d.datum)}&body=${encodeURIComponent(bookingMsg(d))}`}
        ]);
        showMoreButton();
      });
  }

  /* Vrije tekst */
  function handleText(text){
    if(!text.trim()) return;
    if(booking){ handleBooking(text); return; }
    addMsg(text,'user');

    const st=matchSmalltalk(text);
    if(st){ botSay(st,()=>showMenu()); return; }

    const r=rankTopics(text);
    if(r.top && r.top.booking){ startBooking(); return; }
    if(r.top && (r.gap>=0.8 || !r.second)){            // duidelijke winnaar
      answerTopic(r.top); return;
    }
    if(r.top && r.second){                              // twijfel → bied beide aan
      botSay("Ik denk dat je één van deze bedoelt — waar kan ik je over vertellen?",
        ()=>showMenu([r.top,r.second]));
      return;
    }
    // niets gevonden → nooit verzinnen, doorsturen
    botSay(FALLBACK,()=>{ addCTA(FALLBACK_CTA); showMoreButton(); });
  }

  /* Events */
  const launcher=root.querySelector('#kf-launcher');
  const winEl=root.querySelector('#kf-window');
  function setOpen(open){
    root.classList.toggle('kf-open',open);
    launcher.setAttribute('aria-expanded',open?'true':'false');
    launcher.setAttribute('aria-label',open?'Chat sluiten':'Chat openen');
    // Gesloten venster uit de tab-volgorde halen (inert = ook aria-hidden).
    winEl.inert=!open;
    if(open){
      root.classList.add('kf-engaged'); // pulse blijvend stoppen na eerste opening
      input.focus();
      if(!bodyEl.dataset.started){ bodyEl.dataset.started="1"; botSay(WELCOME,()=>showMenu()); }
    } else {
      launcher.focus(); // focus terug naar de knop bij sluiten
    }
  }
  launcher.onclick=()=> setOpen(!root.classList.contains('kf-open'));
  root.querySelector('#kf-send').onclick=()=>{ handleText(input.value); input.value=''; };
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'){ handleText(input.value); input.value=''; }});
  // Escape sluit de chat (alleen als 'ie open is).
  root.addEventListener('keydown',e=>{ if(e.key==='Escape' && root.classList.contains('kf-open')) setOpen(false); });

  /* Test-haak: maakt matching aanroepbaar buiten de UI (voor geautomatiseerd testen) */
  window.__kfMatch=function(text){
    const st=matchSmalltalk(text); if(st) return "SMALLTALK";
    const r=rankTopics(text);
    if(!r.top) return "FALLBACK";
    if(r.gap>=0.8||!r.second) return r.top.id;
    return r.top.id+"|"+r.second.id;
  };
})();
</script>
